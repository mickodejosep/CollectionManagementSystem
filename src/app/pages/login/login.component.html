<section class="login-wrapper">
  <form (ngSubmit)="onLogin()" class="login-card" novalidate>
    <h1>Welcome Back</h1>
    <p>Sign in to continue to the Collection Management System.</p>

    <label for="email">Email</label>
    <input
      id="email"
      type="email"
      [(ngModel)]="email"
      name="email"
      placeholder="you@example.com"
      required
    />

    <label for="password">Password</label>
    <input
      id="password"
      type="password"
      [(ngModel)]="password"
      name="password"
      placeholder="Minimum 6 characters"
      required
    />

    <small class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </small>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Login' }}
    </button>
  </form>
</section>
